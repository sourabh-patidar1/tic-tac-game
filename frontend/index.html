<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Pro</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe Pro</h1>
        
        <div id="setup-section" class="card">
            <h2>Start New Game</h2>
            <div class="input-group">
                <input type="text" id="player-x" placeholder="Player X Name" value="Player X">
                <input type="text" id="player-o" placeholder="Player O Name (or AI)" value="AI">
            </div>
            <button id="start-btn" class="primary-btn">Start Game</button>
        </div>

        <div id="game-section" class="card hidden">
            <div class="status-bar">
                <div id="turn-indicator" class="turn-x">Turn: X</div>
                <div id="game-id-display">Game ID: <span></span></div>
            </div>

            <div class="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <button id="restart-btn" class="secondary-btn">New Game</button>
        </div>

        <div id="leaderboard-section" class="card">
            <h2>Leaderboard</h2>
            <ul id="leaderboard-list">
                <!-- Leaderboard items go here -->
            </ul>
        </div>

        <div id="history-section" class="card">
            <h2>Recent Games</h2>
            <ul id="history-list">
                <!-- History items go here -->
            </ul>
        </div>
    </div>

    <!-- Winner Modal -->
    <div id="winner-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="winner-text">Winner!</h2>
            <p id="winner-subtext"></p>
            <button id="modal-close-btn" class="primary-btn">Awesome!</button>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="loading-overlay hidden">
        <div class="spinner"></div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
